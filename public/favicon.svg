<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <drop-shadow dx="0" dy="16" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background rounded card -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Playful decorative speech bubble outline -->
  <path d="M 120 180 Q 120 120 180 120 L 332 120 Q 392 120 392 180 L 392 300 Q 392 360 332 360 L 220 360 L 150 410 C 140 417 130 410 132 398 L 138 360 Q 120 350 120 300 Z" fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" opacity="0.15" />

  <!-- Signature Diamond from the Logo -->
  <g transform="translate(190, 310) rotate(45)">
    <rect x="-35" y="-35" width="70" height="70" rx="18" fill="#FFFFFF" filter="url(#shadow)" />
  </g>

  <!-- Friendly, Bold Question Mark '?' -->
  <text x="265" y="340" font-family="'Space Grotesk', 'Inter', system-ui, sans-serif" font-weight="900" font-size="280" fill="#FFFFFF" text-anchor="middle" filter="url(#shadow)">?</text>
</svg>
